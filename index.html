<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MBTI 职业性格测试 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #b8d4e8 0%, #a8c8dd 25%, #c2dae8 50%, #aec9db 75%, #b5cfe2 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -15%;
            right: -10%;
            width: 75%;
            height: 75%;
            background: radial-gradient(circle at 40% 35%, rgba(180, 210, 235, 0.6) 0%, rgba(150, 190, 215, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -10%;
            left: -8%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle at 60% 65%, rgba(170, 200, 225, 0.5) 0%, rgba(140, 175, 200, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 45px rgba(70, 100, 130, 0.25), 0 8px 20px rgba(50, 80, 110, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 24px 20px 28px;
            display: flex;
            flex-direction: column;
            min-height: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .test-header {
            text-align: center;
            margin-bottom: 14px;
        }

        .test-header h1 {
            font-size: 1.6rem;
            font-weight: 550;
            color: #1b4565;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .test-header .subtitle {
            font-size: 0.85rem;
            color: #3a6d90;
            font-weight: 400;
        }

        .dimension-hint {
            display: flex;
            justify-content: center;
            gap: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2e5d80;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 5px 18px;
            margin: 0 auto 14px;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .progress-section {
            margin: 12px 0 14px;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: rgba(180, 200, 215, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #5b9cc9, #3f7eb0);
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(50, 120, 185, 0.5);
            transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .question-counter {
            text-align: right;
            font-size: 0.85rem;
            color: #356080;
            margin-top: 5px;
            font-weight: 500;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 24px 18px;
            margin: 8px 0 18px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 12px 25px rgba(60, 90, 120, 0.12);
            text-align: center;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 480;
            color: #1a3f5a;
            line-height: 1.5;
            word-break: break-word;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1.5px solid rgba(255, 255, 255, 0.75);
            border-radius: 24px;
            padding: 16px 18px;
            font-size: 1.05rem;
            font-weight: 480;
            color: #1e4260;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 5px 12px rgba(60, 90, 120, 0.1);
            word-break: break-word;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.75);
            border-color: rgba(100, 150, 200, 0.6);
            box-shadow: 0 8px 18px rgba(50, 100, 150, 0.2);
            transform: translateY(-2px);
        }

        .option-btn:active {
            transform: translateY(1px);
            background: rgba(240, 245, 250, 0.8);
        }

        .option-letter {
            background: rgba(70, 140, 200, 0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 16px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            color: #1b4a72;
            border: 1px solid rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
        }

        .result-container {
            animation: fadeSlide 0.5s ease;
        }

        .personality-type {
            font-size: 3.2rem;
            font-weight: 550;
            letter-spacing: 5px;
            color: #1a4060;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 0;
            margin: 12px 0;
            text-align: center;
        }

        .type-name {
            font-size: 1.4rem;
            font-weight: 480;
            color: #2e5880;
            margin-bottom: 14px;
            text-align: center;
        }

        .analysis-box {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 18px 16px;
            margin: 14px 0;
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: left;
            color: #1c3d58;
            line-height: 1.7;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 14px 0;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            color: #1e4262;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .restart-btn,
        .history-btn,
        .back-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            padding: 12px 22px;
            color: #1e4a6e;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-shadow: 0 6px 16px rgba(50, 90, 130, 0.15);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .restart-btn:hover,
        .history-btn:hover,
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 8px 20px rgba(50, 100, 150, 0.25);
            transform: scale(1.02);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(50, 90, 130, 0.2);
        }

        .history-type {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a4060;
            letter-spacing: 2px;
        }

        .history-time {
            font-size: 0.8rem;
            color: #5a8099;
        }

        .history-name {
            font-size: 0.9rem;
            color: #356080;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #5a8099;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .clear-history-btn {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(200, 100, 100, 0.4);
            color: #8b4a4a;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }

        .clear-history-btn:hover {
            background: rgba(255, 200, 200, 0.4);
        }

        .sync-status {
            text-align: center;
            font-size: 0.75rem;
            color: #4a8a5a;
            margin-top: 4px;
        }

        .sync-status.error {
            color: #8a4a4a;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #356080;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0.5;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 400px) {
            .glass-card {
                padding: 18px 14px 22px;
                border-radius: 28px;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .personality-type {
                font-size: 2.6rem;
            }
        }
    </style>
</head>

            const appContainer = document.getElementById('appContainer');

            let isAdmin = false;
            let historyDetailIndex = null;

            // ============ Supabase 数据库操作 ============
            async function saveResultToServer(type, typeName, scoresData) {
                try {
                    const { error } = await supabase
                        .from('mbti_results')
                        .insert([
                            { type, type_name: typeName, scores: scoresData }
                        ]);
                    if (error) throw error;
                    return true;
                } catch (err) {
                    console.error('云端保存失败，保存到本地:', err);
                    const history = JSON.parse(localStorage.getItem('mbti_history') || '[]');
                    history.unshift({
                        id: Date.now(), type, typeName, scores: scoresData,
                        timestamp: new Date().toLocaleString('zh-CN')
                    });
                    localStorage.setItem('mbti_history', JSON.stringify(history.slice(0, 50)));
                    return false;
                }
            }

            async function getHistoryFromServer() {
                try {
                    const { data, error } = await supabase
                        .from('mbti_results')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(100);
                    if (error) throw error;
                    return data.map(record => ({
                        id: record.id,
                        type: record.type,
                        typeName: record.type_name,
                        scores: record.scores,
                        timestamp: new Date(record.created_at).toLocaleString('zh-CN')
                    }));
                } catch (err) {
                    console.error('云端获取失败，使用本地:', err);
                    return JSON.parse(localStorage.getItem('mbti_history') || '[]');
                }
            }

            async function clearServerHistory() {
                try {
                    const { error } = await supabase
                        .from('mbti_results')
                        .delete()
                        .neq('id', 0);
                    if (error) throw error;
                    return true;
                } catch (err) {
                    console.error('清除失败:', err);
                    return false;
                }
            }

            // ============ 渲染函数 ============
            function render() {
                switch (currentPage) {
                    case 'test': renderQuestion(); break;
                    case 'result': renderResult(); break;
                    case 'history': renderHistory(); break;
                    case 'history-detail': renderHistoryDetail(); break;
                }
            }

            function renderQuestion() {
                const q = questions[currentIndex];
                const progress = (currentIndex / questions.length) * 100;

                appContainer.innerHTML = `
                    <div class="test-header">
                        <h1>MBTI 职业性格测试</h1>
                        <p class="subtitle"> 93题专业版</p>

                        <div class="question-counter">${currentIndex + 1} / ${questions.length}</div>
                    </div>
                    <div class="question-card"><div class="question-text">${q.text}</div></div>
                    <div class="options-grid">
                        ${q.options.map(opt => `
                            <div class="option-btn" data-letter="${opt.letter}">
                                <span class="option-letter">${opt.letter}</span><span>${opt.text}</span>

                `;

                appContainer.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const letter = this.getAttribute('data-letter');
                        if (scores[letter] !== undefined) scores[letter]++;
                        if (currentIndex < questions.length - 1) {
                            currentIndex++;
                            render();
                        } else {
                            const type = calculateType(scores);
                            const profile = profiles[type] || { name: "探索者", desc: "独特的性格组合。" };

                            currentResultType = type;

                            render();

                    });

                document.getElementById('gotoHistoryBtn').addEventListener('click', () => {
                    currentPage = 'history'; render();
                });

            function calculateType(s) {
                return ((s.E >= s.I ? 'E' : 'I') +
                    (s.S >= s.N ? 'S' : 'N') +
                    (s.T >= s.F ? 'T' : 'F') +
                    (s.J >= s.P ? 'J' : 'P'));
            }

                        <div class="btn-group">
                            ${isAdmin ? '<button class="clear-history-btn" id="clearBtn">🗑️ 清空记录(管理员)</button>' : ''}
                            <button class="back-btn" id="backBtn">← 返回</button>
                            ${!isAdmin ? '<button class="history-btn" id="adminBtn">🔑 管理员</button>' : ''}
                        </div>
                    `;

                    document.querySelectorAll('.history-item').forEach(item => {
                        item.onclick = () => { historyDetailIndex = parseInt(item.dataset.index);
                            currentPage = 'history-detail';
                            render(); };
                    });
                    if (isAdmin) document.getElementById('clearBtn').onclick = async () => {
                        if (confirm('确认清空所有云端记录？')) { await clearServerHistory();
                            render(); }
                    };
                    if (!isAdmin) document.getElementById('adminBtn').onclick = showAdminLogin;
                    document.getElementById('backBtn').onclick = () => {
                        currentPage = currentResultType ? 'result' : 'test';
                        render();
                    };
                }
            }

            async function renderHistoryDetail() {
                const history = await getHistoryFromServer();
                const record = history[historyDetailIndex];
                if (!record) { currentPage = 'history';
                    render(); return; }
                const profile = profiles[record.type] || { name: "未知", desc: "暂无描述" };

                appContainer.innerHTML = `
                    <div class="test-header"><h1>历史详情</h1><p>${record.timestamp}</p></div>
                    <div class="personality-type">${record.type}</div>
                    <div class="type-name">${profile.name}</div>
                    <div class="analysis-box">${profile.desc}</div>
                    <div class="score-grid">
                        ${Object.entries(record.scores).map(([k, v]) => `<div class="score-item"><span>${k}</span><span>${v}分</span></div>`).join('')}
                    </div>
                    <div class="btn-group">
                        <button class="back-btn" id="backBtn">← 返回列表</button>
                        <button class="restart-btn" id="newBtn">↻ 新测试</button>
                    </div>
                `;
                document.getElementById('backBtn').onclick = () => { currentPage = 'history';
                    render(); };
                document.getElementById('newBtn').onclick = () => {
                    currentIndex = 0;
                    scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
                    currentResultType = null;
                    currentPage = 'test';
                    render();
                };
            }

            function showAdminLogin() {
                appContainer.innerHTML = `
                    <div class="test-header"><h3>🔑 管理员验证</h3></div>
                    <div style="text-align:center; padding:20px;">
                        <input type="password" id="passwordInput" class="option-btn" placeholder="请输入管理密码" style="width:100%; text-align:center;">
                        <br><br>
                        <button class="restart-btn" id="loginBtn">验证</button>
                        <button class="back-btn" id="cancelBtn" style="margin-left:10px;">取消</button>
                    </div>
                `;
                document.getElementById('loginBtn').onclick = () => {
                    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                        isAdmin = true;
                        alert('✅ 验证成功！您现在可以管理历史记录。');
                        currentPage = 'history';
                        render();
                    } else { alert('❌ 密码错误'); }
                };
                document.getElementById('cancelBtn').onclick = () => { currentPage = 'history';
                    render(); };
            }

            // 启动
            render();
        })();
    </script>
</body>
</html>
